{{ define "main" }}
<div class="page-hero">
    <div class="page-hero-inner">
        <h1 class="page-title">{{ .Title }}</h1>
        <nav class="breadcrumb">
            <a href="{{ .Site.BaseURL }}">Home</a>
            <span class="bc-sep">›</span>
            <span>{{ .Title }}</span>
        </nav>
    </div>
</div>

<div class="content-wrap">
    {{ with .Site.Data.faq }}{{ if .enable }}
    {{ if .title }}<h2 class="section-title" style="margin-bottom:2rem;">{{ .title }}</h2>{{ end }}
    <div class="post-grid">
        {{ range .questions }}
        <div class="post-card">
            <div class="post-card-body">
                {{ if .question }}<h3 class="post-card-title">{{ .question }}</h3>{{ end }}
                {{ if .answer }}<p class="post-card-desc">{{ .answer }}</p>{{ end }}
            </div>
        </div>
        {{ end }}
    </div>
    {{ end }}{{ end }}
</div>
{{ end }}
