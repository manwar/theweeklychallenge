{{ define "main" }}
<div class="privacy-hero">
  <div class="privacy-hero-inner">
    <h1 class="privacy-title">Privacy Policy</h1>
    <p class="privacy-subtitle">The Weekly Challenge - Website &amp; Mobile Application</p>
    <span class="privacy-badge">Last updated: {{ .Date.Format "2 Jan 2006" }}</span>
  </div>
</div>

<div class="privacy-wrap">
  <div class="privacy-content">
    {{ .Content }}
  </div>
  <p class="privacy-footer-note">
    Effective date: {{ .Date.Format "2 Jan 2006" }} · © {{ now.Year }} Mohammad Sajid Anwar
  </p>
</div>

<style>
.privacy-hero {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 60px 24px 40px;
  text-align: center;
}
.privacy-hero-inner { max-width: 680px; margin: 0 auto; }
.privacy-title {
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--accent);
  margin-bottom: 8px;
}
.privacy-subtitle {
  color: var(--muted);
  font-size: 1rem;
  margin-bottom: 16px;
}
.privacy-badge {
  display: inline-block;
  background: rgba(34,211,238,0.1);
  border: 1px solid rgba(34,211,238,0.3);
  color: var(--accent);
  border-radius: 6px;
  padding: 4px 14px;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.privacy-wrap {
  max-width: 760px;
  margin: 40px auto;
  padding: 0 24px 80px;
}

/* Each ## heading + everything until the next ## becomes a card.
   We fake the card by styling h2 as a card header and the siblings as card body. */
.privacy-content h1 { display: none; } /* hide page title — shown in hero */

.privacy-content h2 {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text);
  margin: 20px 0 0 0;
  padding: 28px 32px 14px;
  border-bottom: 2px solid var(--accent);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px 14px 0 0;
  border-bottom: 2px solid var(--accent);
}

/* Everything between two h2s is grouped via the adjacent sibling approach */
.privacy-content h2 + p,
.privacy-content h2 + ul,
.privacy-content h2 ~ p,
.privacy-content h2 ~ ul {
  background: var(--surface);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  margin: 0;
  padding: 0 32px;
}

/* This is tricky with pure CSS — use a wrapper div approach instead */

.privacy-footer-note {
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
  margin-top: 20px;
}
@media (max-width: 600px) {
  .privacy-title { font-size: 1.6rem; }
}
</style>

<script>
// Hugo renders {{ .Content }} as flat HTML: h2, p, ul siblings.
// We wrap each section (from one h2 to the next) in a .privacy-card div.
(function () {
  var content = document.querySelector('.privacy-content');
  if (!content) return;

  var nodes = Array.from(content.childNodes);
  var card = null;

  nodes.forEach(function (node) {
    if (node.nodeType === 3) return; // skip text nodes

    if (node.nodeName === 'H2') {
      card = document.createElement('div');
      card.className = 'privacy-card';
      content.insertBefore(card, node);
    }

    if (card) {
      card.appendChild(node);
    }
  });
})();
</script>

<style>
.privacy-content h2 {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--accent) !important;
  border: none;
  background: none;
  border-radius: 0;
  padding: 0 0 10px 0;
}
.privacy-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 32px;
  margin-bottom: 20px;
}
.privacy-card h2 {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--accent);
}
.privacy-card p {
  color: var(--muted);
  margin-bottom: 10px;
  line-height: 1.75;
  text-align: justify;
}
.privacy-card p:last-child { margin-bottom: 0; }
.privacy-card ul {
  color: var(--muted);
  padding-left: 20px;
  line-height: 2;
  margin-bottom: 10px;
  text-align: justify;
}
.privacy-card a { color: var(--accent); }
.privacy-card strong { color: var(--text); }
.privacy-card code {
  background: rgba(34,211,238,0.08);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 0.9em;
  color: var(--accent);
}
@media (max-width: 600px) {
  .privacy-card { padding: 20px; }
}
</style>
{{ end }}
