{{ define "main" }}
<div class="page-hero">
    <div class="page-hero-inner">
        <h1 class="page-title">{{ .Title | replaceRE "^The Weekly Challenge - " "" }}</h1>
        {{ with .Description }}<p class="page-desc">{{ . }}</p>{{ end }}
        <nav class="breadcrumb">
            <a href="{{ .Site.BaseURL }}">Home</a>
            <span class="bc-sep">›</span>
            {{ if .Section }}<a href="{{ .Site.BaseURL }}{{ .Section }}">{{ .Section | title }}</a><span class="bc-sep">›</span>{{ end }}
            <span>{{ .Title }}</span>
        </nav>
    </div>
</div>

<div class="content-wrap">
    <a href="{{ .Site.BaseURL }}blogs" class="back-btn">&#8592; Back to Blogs</a>
    <article class="prose">
        {{ with .Params.image }}
        <div class="post-hero-img">
            <img src="{{ . | absURL }}" alt="{{ $.Title }}">
        </div>
        {{ end }}
        {{ .Content }}
    </article>
</div>
{{ end }}
