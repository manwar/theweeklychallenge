<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | {{ .Site.Title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ .Site.BaseURL }}css/twc.css">
</head>
<body>
    {{ partial "nav.html" . }}
    <main class="main-content">
        <div class="page-hero" style="min-height:60vh; display:flex; align-items:center; justify-content:center; text-align:center;">
            <div class="page-hero-inner">
                <h1 class="page-title" style="font-size:clamp(4rem,12vw,8rem); margin-bottom:.5rem;">404</h1>
                <p style="font-size:1.2rem; opacity:.7; margin-bottom:2rem;">The page you are looking for was moved, removed, or never existed.</p>
                <a href="{{ .Site.BaseURL }}" class="btn-primary">← Go Home</a>
            </div>
        </div>
    </main>
    {{ partial "footer.html" . }}
    <script src="{{ .Site.BaseURL }}js/twc.js"></script>
</body>
</html>
